<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <!-- 深色圆角背景 -->
    <rect width="64" height="64" rx="14" fill="#040906" />

    <!-- 核心脉冲线（加粗以保证小尺寸下的清晰度） -->
    <path d="M 6 32 L 18 32 L 25 14 L 39 50 L 46 32 L 58 32" stroke="#00FF87" stroke-width="6" stroke-linecap="round"
        stroke-linejoin="round" fill="none" />

    <!-- 内部高光提升质感 -->
    <path d="M 6 32 L 18 32 L 25 14 L 39 50 L 46 32 L 58 32" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" fill="none" />
</svg>